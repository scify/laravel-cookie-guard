name: run-tests

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        os: [ ubuntu-latest ]
        php: [ 8.2 ]
        laravel: [ 12.* ]
        stability: [ prefer-lowest, prefer-stable ]

    runs-on: ${{ matrix.os }}

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Build frontend assets
        run: npm ci && npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: composer test && npm test

  coverage:
    runs-on: ubuntu-latest
    name: Coverage Report

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Build frontend assets
        run: npm ci && npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: 8.2
          coverage: xdebug

      - name: Install dependencies
        run: |
          composer require "laravel/framework:12.*" --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests with coverage
        run: vendor/bin/pest --coverage --coverage-clover=clover.xml

      - name: Generate coverage badge
        uses: timkrase/phpunit-coverage-badge@dcfab11dbbeaf02d11bb9746448f55e35eff1fc4 # v1.2.1
        with:
          clover_report: clover.xml
          coverage_badge_path: output/coverage.svg
          push_badge: false

      - name: Upload coverage badge
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-badge
          path: output/coverage.svg

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@a99c28d3f0da835de33ff2feb2e15691c7b9641f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: clover.xml
          fail_ci_if_error: false
        continue-on-error: true
